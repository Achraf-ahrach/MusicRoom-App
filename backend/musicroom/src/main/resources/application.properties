spring.application.name=${APP_NAME:musicroom}

# ========================================
# PostgreSQL
# ========================================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/musicroom}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# ========================================
# JPA
# ========================================

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ========================================
# Flyway
# ========================================

spring.flyway.enabled=false

# ========================================
# JWT Configuration
# ========================================

jwt.secret=${JWT_SECRET:default-secret-key-change-this-in-production-minimum-32-characters}
jwt.expiration.access=${JWT_EXPIRATION_ACCESS:600000}
jwt.expiration.refresh=${JWT_EXPIRATION_REFRESH:604800000}

# ========================================
# Email Configuration
# ========================================

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:test@example.com}
spring.mail.password=${MAIL_PASSWORD:test-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email sender info

app.mail.from=${MAIL_FROM:test@example.com}
app.mail.from.name=${MAIL_FROM_NAME:Music Room}

# ========================================
# Google OAuth2
# ========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:default-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:default-client-secret}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.provider.google.user-name-attribute=sub